<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>F1 Race Assistant</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏎️</text></svg>">
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface-hover: #242424;
      --border: #2a2a2a;
      --border-light: #333;
      --text: #e8e8e8;
      --text-muted: #888;
      --red: #e10600;
      --red-hover: #ff1a14;
      --green: #00d46b;
      --orange: #ff8c00;
      --gold: #ffd700;
      --silver: #c0c0c0;
      --bronze: #cd7f32;
      --blue: #4a9eff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    .container { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* Header */
    header {
      display: flex; align-items: center; gap: 0.75rem;
      margin-bottom: 2rem; padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
    .logo { font-size: 1.8rem; }
    .ai-badge {
      margin-left: auto; font-size: 0.7rem; padding: 0.2rem 0.6rem;
      border-radius: 20px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .ai-badge.on { background: #0a2e1a; color: var(--green); border: 1px solid #1a4a2a; }
    .ai-badge.off { background: #2e1a1a; color: #de7b7b; border: 1px solid #4e2a2a; }

    /* Auth UI */
    .auth-section { display: none; }
    .auth-section.visible { display: block; }
    .auth-forms { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
    .auth-card {
      padding: 1.5rem; background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px;
    }
    .auth-card h3 { font-size: 1.1rem; margin-bottom: 1rem; }
    .auth-card label {
      display: block; font-size: 0.8rem; color: var(--text-muted);
      text-transform: uppercase; margin-bottom: 0.25rem;
    }
    .auth-card input {
      width: 100%; padding: 0.5rem 0.75rem; background: var(--bg);
      border: 1px solid var(--border); border-radius: 6px; color: var(--text);
      font-size: 0.9rem; outline: none; margin-bottom: 0.75rem;
    }
    .auth-card input:focus { border-color: var(--blue); }
    .auth-card .btn-primary { width: 100%; margin-top: 0.5rem; }
    .user-display { font-size: 0.85rem; font-weight: 600; color: var(--blue); }
    .btn-logout {
      padding: 0.35rem 0.75rem; border: 1px solid var(--border); border-radius: 6px;
      background: var(--surface); color: var(--text-muted); font-size: 0.78rem;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-logout:hover { background: var(--surface-hover); color: var(--text); }
    .btn-fav {
      background: none; border: none; font-size: 1.3rem; cursor: pointer;
      transition: transform 0.2s; padding: 0.25rem;
    }
    .btn-fav:hover { transform: scale(1.2); }

    /* Reminders UI */
    .reminders-section { display: none; }
    .reminders-section.visible { display: block; }
    .reminder-list { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.5rem; }
    .reminder-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.75rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    }
    .reminder-info { font-size: 0.85rem; }
    .reminder-form {
      display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: end;
      padding: 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    }
    .reminder-form label { display: flex; flex-direction: column; gap: 0.25rem; font-size: 0.75rem; color: var(--text-muted); }
    .reminder-form input { padding: 0.4rem 0.6rem; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); width: 100px; }
    .btn-danger { background: #8b0000; color: white; padding: 0.3rem 0.6rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }
    .btn-danger:hover { background: #a00000; }

    /* Tabs */
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .tab {
      padding: 0.5rem 1.25rem; border: 1px solid var(--border); border-radius: 8px;
      background: var(--surface); color: var(--text-muted); font-size: 0.85rem;
      font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .tab:hover { background: var(--surface-hover); color: var(--text); }
    .tab.active { background: var(--red); color: #fff; border-color: var(--red); }

    /* Buttons */
    .btn-primary {
      padding: 0.6rem 1.5rem; border: none; border-radius: 8px;
      background: var(--red); color: #fff; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: background 0.2s, transform 0.1s;
    }
    .btn-primary:hover:not(:disabled) { background: var(--red-hover); }
    .btn-primary:active { transform: scale(0.97); }
    .btn-primary:disabled { background: #555; cursor: not-allowed; }

    .btn-ai {
      padding: 0.45rem 0.9rem; border: 1px solid var(--blue); border-radius: 8px;
      background: transparent; color: var(--blue); font-size: 0.78rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 0.35rem;
    }
    .btn-ai:hover:not(:disabled) { background: var(--blue); color: #fff; }
    .btn-ai:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Year selector */
    .year-select {
      display: none; align-items: center; gap: 1rem; margin-bottom: 1.5rem;
    }
    .year-select.visible { display: flex; flex-wrap: wrap; }
    .year-select label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .year-select input {
      width: 100px; padding: 0.5rem 0.75rem; background: var(--surface);
      border: 1px solid var(--border); border-radius: 8px; color: var(--text);
      font-size: 0.9rem; outline: none; transition: border-color 0.2s;
    }
    .year-select input:focus { border-color: var(--red); }

    /* Standings tables */
    .standings-section { display: none; }
    .standings-section.visible { display: block; }
    .standings-controls {
      display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem;
    }
    .standings-controls label {
      font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em;
    }
    .standings-controls input {
      width: 100px; padding: 0.5rem 0.75rem; background: var(--surface);
      border: 1px solid var(--border); border-radius: 8px; color: var(--text);
      font-size: 0.9rem; outline: none; transition: border-color 0.2s;
    }
    .standings-controls input:focus { border-color: var(--red); }
    .standings-type {
      display: flex; gap: 0.5rem; margin-bottom: 1.5rem;
    }
    .type-btn {
      padding: 0.4rem 1rem; border: 1px solid var(--border); border-radius: 6px;
      background: var(--surface); color: var(--text-muted); font-size: 0.8rem;
      font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .type-btn:hover { background: var(--surface-hover); color: var(--text); }
    .type-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }

    .standings-table {
      width: 100%; border-collapse: collapse; font-size: 0.85rem;
    }
    .standings-table th {
      text-align: left; padding: 0.5rem 0.75rem; font-size: 0.7rem;
      text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }
    .standings-table td {
      padding: 0.6rem 0.75rem; border-bottom: 1px solid var(--border);
    }
    .standings-table tr:last-child td { border-bottom: none; }
    .standings-table .pos { font-weight: 700; width: 40px; }
    .standings-table .pos.p1 { color: var(--gold); }
    .standings-table .pos.p2 { color: var(--silver); }
    .standings-table .pos.p3 { color: var(--bronze); }
    .standings-table .name { font-weight: 600; }
    .standings-table .team { color: var(--text-muted); font-size: 0.78rem; }
    .standings-table .pts { font-weight: 700; text-align: right; }
    .standings-table .wins { text-align: center; color: var(--text-muted); font-size: 0.8rem; }

    .standings-empty {
      text-align: center; padding: 2rem; color: var(--text-muted);
    }
    .standings-empty .icon { font-size: 2rem; margin-bottom: 0.5rem; }

    /* Status */
    .status {
      padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.85rem;
      margin-bottom: 1rem; display: none;
    }
    .status.loading { display: block; background: #1a1a2e; color: #7b8cde; border: 1px solid #2a2a4e; }
    .status.error { display: block; background: #2e1a1a; color: #de7b7b; border: 1px solid #4e2a2a; }
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(123,140,222,0.3); border-top-color: #7b8cde;
      border-radius: 50%; animation: spin 0.6s linear infinite;
      vertical-align: middle; margin-right: 0.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Latest section */
    .latest-section { display: none; }
    .latest-section.visible { display: block; }

    /* Race list */
    .race-list { display: none; flex-direction: column; gap: 0.35rem; }
    .race-list.visible { display: flex; }
    .season-header {
      display: none; margin-bottom: 1rem;
    }
    .season-header.visible { display: block; }
    .season-header h2 { font-size: 1.25rem; font-weight: 700; }
    .season-header span { color: var(--text-muted); font-size: 0.85rem; }

    .race-item {
      padding: 0.75rem 1rem; background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; gap: 0.75rem;
    }
    .race-item:hover { background: var(--surface-hover); border-color: var(--border-light); }
    .race-item.selected { border-color: var(--blue); background: #0f1a2e; }
    .race-item .round {
      width: 32px; height: 32px; border-radius: 50%; background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700; color: var(--text-muted); flex-shrink: 0;
    }
    .race-item .info { flex: 1; }
    .race-item .info .name { font-size: 0.9rem; font-weight: 600; }
    .race-item .info .meta { font-size: 0.75rem; color: var(--text-muted); }
    .race-item .arrow { color: var(--text-muted); font-size: 0.8rem; transition: transform 0.25s; }
    .race-item.expanded .arrow { transform: rotate(90deg); }

    /* Inline race detail — slides right under the race item */
    .race-detail {
      max-height: 0; overflow: hidden; opacity: 0;
      padding: 0 1rem; margin: 0 0 0 0.5rem;
      border-left: 2px solid var(--blue);
      background: var(--surface);
      transition: max-height 0.35s ease, opacity 0.25s ease, padding 0.3s ease;
    }
    .race-detail.open {
      max-height: 2000px; opacity: 1;
      padding: 1rem;
    }

    .race-detail h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 0.4rem; }
    .race-detail .meta { display: flex; gap: 1rem; font-size: 0.78rem; color: var(--text-muted); margin-bottom: 0.75rem; flex-wrap: wrap; }
    .race-detail .meta span { display: flex; align-items: center; gap: 0.25rem; }

    /* Podium cards */
    .podium-card {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem;
      margin-bottom: 0.75rem;
    }
    .podium-card-item {
      padding: 0.5rem; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; text-align: center;
    }
    .podium-card-item .pos { font-size: 1.2rem; font-weight: 800; }
    .podium-card-item .pos.gold { color: var(--gold); }
    .podium-card-item .pos.silver { color: var(--silver); }
    .podium-card-item .pos.bronze { color: var(--bronze); }
    .podium-card-item .driver { font-size: 0.72rem; margin-top: 0.15rem; }
    .podium-card-item .team { font-size: 0.63rem; color: var(--text-muted); }

    .race-detail .action-bar {
      display: flex; align-items: center; gap: 0.6rem; padding: 0.6rem 0;
      border-top: 1px solid var(--border); margin-top: 0.5rem;
      flex-wrap: wrap;
    }

    /* AI response */
    .ai-response {
      max-height: 0; overflow: hidden; opacity: 0;
      transition: max-height 0.35s ease, opacity 0.25s ease;
    }
    .ai-response.visible { max-height: 2000px; opacity: 1; }

    .ai-section {
      padding: 0.6rem 0; border-top: 1px solid var(--border);
    }
    .ai-section:first-child { border-top: none; padding-top: 0; }
    .ai-section h4 {
      font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-muted); margin-bottom: 0.4rem;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .ai-section h4 .dot { width: 6px; height: 6px; border-radius: 50%; }
    .ai-section h4 .dot.red { background: var(--red); }
    .ai-section h4 .dot.green { background: var(--green); }
    .ai-section h4 .dot.orange { background: var(--orange); }
    .ai-section p { font-size: 0.9rem; line-height: 1.7; }

    /* Driver link */
    .driver-link {
      color: var(--blue); text-decoration: none; cursor: pointer;
      font-weight: 600; transition: color 0.2s;
    }
    .driver-link:hover { color: #6bb5ff; text-decoration: underline; }

    /* Driver page */
    .driver-page { display: none; }
    .driver-page.visible { display: block; }
    .driver-profile {
      padding: 1.25rem; background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; margin-bottom: 1.5rem;
    }
    .driver-profile h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.5rem; }
    .driver-profile .meta { display: flex; flex-wrap: wrap; gap: 1rem; font-size: 0.85rem; color: var(--text-muted); }
    .driver-profile .meta span { display: flex; align-items: center; gap: 0.3rem; }
    .driver-stats {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 0.75rem; margin-top: 1rem;
    }
    .driver-stat-card {
      padding: 0.75rem; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; text-align: center;
    }
    .driver-stat-card .label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); }
    .driver-stat-card .value { font-size: 1.3rem; font-weight: 700; margin-top: 0.25rem; }

    .driver-season-select {
      display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem;
    }
    .driver-season-select label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .driver-season-select input {
      width: 100px; padding: 0.4rem 0.6rem; background: var(--surface);
      border: 1px solid var(--border); border-radius: 6px; color: var(--text);
      font-size: 0.85rem; outline: none;
    }
    .driver-season-select input:focus { border-color: var(--blue); }
    .driver-season-select .btn-primary { padding: 0.4rem 1rem; font-size: 0.8rem; }

    .back-btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.4rem 0.8rem; background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text-muted); font-size: 0.8rem;
      cursor: pointer; margin-bottom: 1rem; transition: all 0.2s;
    }
    .back-btn:hover { background: var(--surface-hover); color: var(--text); }

    /* Footer */
    footer {
      margin-top: 3rem; padding-top: 1rem; border-top: 1px solid var(--border);
      text-align: center; font-size: 0.75rem; color: var(--text-muted);
    }
    footer a { color: var(--red); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 600px) {
      .container { padding: 1.25rem 1rem; }
      .podium-card { grid-template-columns: 1fr; }
      .tabs { flex-wrap: wrap; }
      .year-select { flex-direction: column; align-items: stretch; }
      .race-detail { margin-left: 0; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <span class="logo">🏎️</span>
      <h1>F1 Race Assistant</h1>
      <span id="ai-badge" class="ai-badge off">AI</span>
      <span id="header-user" class="user-display" style="display:none"></span>
      <button id="header-logout" class="btn-logout" style="display:none" onclick="doLogout()">Logout</button>
      <button id="header-login" class="btn-logout" style="display:none" onclick="switchTab('auth')">Login</button>
    </header>

    <!-- Tab navigation -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('latest')" id="tab-latest">Latest Race</button>
      <button class="tab" onclick="switchTab('season')" id="tab-season">Browse Seasons</button>
      <button class="tab" onclick="switchTab('standings')" id="tab-standings">Standings</button>
      <button class="tab" onclick="switchTab('reminders')" id="tab-reminders">Reminders</button>
      <button class="tab" onclick="switchTab('auth')" id="tab-auth">Account</button>
    </div>

    <!-- Latest Race Tab -->
    <div class="latest-section visible" id="section-latest">
      <div id="latest-status" class="status"></div>
      <div id="latest-container"></div>
    </div>

    <!-- Season Browse Tab -->
    <div class="year-select" id="section-season-controls">
      <label for="input-year">Season Year</label>
      <input type="number" id="input-year" placeholder="2024" min="1950" max="2030">
      <button class="btn-primary" id="btn-season" onclick="fetchSeason()">Show Races</button>
    </div>

    <div id="season-status" class="status"></div>
    <div class="season-header" id="season-header">
      <h2 id="season-title"></h2>
      <span id="season-count"></span>
    </div>
    <div class="race-list" id="race-list"></div>

    <!-- Standings Tab -->
    <div class="standings-section" id="section-standings">
      <div class="standings-controls" id="standings-controls">
        <label for="input-standings-year">Year</label>
        <input type="number" id="input-standings-year" placeholder="2024" min="1950" max="2030">
        <button class="btn-primary" id="btn-standings" onclick="fetchStandings()">Show Standings</button>
      </div>
      <div id="standings-status" class="status"></div>
      <div class="standings-type" id="standings-type-toggle" style="display:none">
        <button class="type-btn active" onclick="showStandingsType('drivers')">Drivers</button>
        <button class="type-btn" onclick="showStandingsType('constructors')">Constructors</button>
      </div>
      <div id="standings-content"></div>
    </div>

    <!-- Account Tab -->
    <div class="auth-section" id="section-auth">
      <div id="auth-status" class="status"></div>
      <div id="auth-guest" class="auth-forms">
        <div class="auth-card">
          <h3>🔑 Login</h3>
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="you@example.com">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="At least 8 characters">
          <button class="btn-primary" onclick="doLogin()">Login</button>
        </div>
        <div class="auth-card">
          <h3>📝 Register</h3>
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" placeholder="you@example.com">
          <label for="reg-name">Display Name</label>
          <input type="text" id="reg-name" placeholder="Your name">
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" placeholder="At least 8 characters">
          <button class="btn-primary" onclick="doRegister()">Create Account</button>
        </div>
      </div>
      <div id="auth-logged-in" style="display:none">
        <div class="driver-profile">
          <h2 id="profile-name">—</h2>
          <div class="meta">
            <span>📧 <span id="profile-email">—</span></span>
          </div>
          <div class="action-bar" style="margin-top:1rem;">
            <button class="btn-logout" onclick="doLogout()">Logout</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Reminders Tab -->
    <div class="reminders-section" id="section-reminders">
      <div id="reminders-status" class="status"></div>
      <div id="reminders-content">
        <div id="reminders-locked" style="display:none" class="standings-empty">
          <div class="icon">🔒</div>
          <p>Please <a href="#" onclick="switchTab('auth'); return false;">login</a> to manage reminders.</p>
        </div>
        <div id="reminders-list-container" style="display:none">
          <div id="reminders-list" class="reminder-list"></div>
          <h3 style="margin: 1.5rem 0 0.75rem;">New Reminder</h3>
          <form class="reminder-form" onsubmit="createReminder(event)">
            <label>Year <input type="number" id="rem-year" placeholder="2024" min="2024" max="2030" required></label>
            <label>Round <input type="number" id="rem-round" placeholder="1" min="1" max="25" required></label>
            <label>Notify (hours before) <input type="number" id="rem-hours" placeholder="24" min="1" max="168" value="24" required></label>
            <button class="btn-primary" type="submit">Add Reminder</button>
          </form>
        </div>
      </div>
    </div>

    <!-- Driver Detail Page -->
    <div class="driver-page" id="section-driver">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
        <div class="back-btn" onclick="goBack()">← Back</div>
        <button id="driver-fav-btn" class="btn-fav" style="display:none" onclick="toggleDriverFav()" title="Add to favorites"></button>
      </div>
      <div id="driver-status" class="status"></div>
      <div id="driver-content"></div>
    </div>

    <footer>
      Data from <a href="https://api.jolpi.ca/ergast/f1/" target="_blank">Jolpica-F1</a>
      · AI by <a href="https://qwen.ai" target="_blank">Qwen</a>
      · <a href="/docs" target="_blank">API Docs</a>
    </footer>
  </div>

  <script>
    // ── Tab switching ──
    let currentStandingsYear = null;
    let currentStandingsType = 'drivers';

    function switchTab(tab) {
      document.getElementById('tab-latest').classList.toggle('active', tab === 'latest');
      document.getElementById('tab-season').classList.toggle('active', tab === 'season');
      document.getElementById('tab-standings').classList.toggle('active', tab === 'standings');
      document.getElementById('tab-reminders').classList.toggle('active', tab === 'reminders');
      document.getElementById('tab-auth').classList.toggle('active', tab === 'auth');
      document.getElementById('section-latest').classList.toggle('visible', tab === 'latest');
      document.getElementById('section-season-controls').classList.toggle('visible', tab === 'season');
      document.getElementById('section-standings').classList.toggle('visible', tab === 'standings');
      document.getElementById('section-reminders').classList.toggle('visible', tab === 'reminders');
      document.getElementById('section-auth').classList.toggle('visible', tab === 'auth');
      document.getElementById('section-driver').classList.remove('visible');
      // Clear season list when leaving the tab
      if (tab !== 'season') {
        document.getElementById('race-list').classList.remove('visible');
        document.getElementById('season-header').classList.remove('visible');
      }
      // Load reminders when tab is opened
      if (tab === 'reminders') loadRemindersTab();
      if (tab === 'season') document.getElementById('input-year').focus();
      if (tab === 'standings') document.getElementById('input-standings-year').focus();
    }

    // ── Status helpers ──
    function showStatus(id, msg, type) {
      const el = document.getElementById(id);
      el.className = 'status ' + type;
      el.innerHTML = type === 'loading' ? `<span class="spinner"></span>${msg}` : msg;
    }
    function hideStatus(id) { document.getElementById(id).className = 'status'; }

    // ── Render podium cards ──
    function renderPodium(podium) {
      if (!podium || podium.length < 3) return '';
      const medals = ['gold', 'silver', 'bronze'];
      let html = '<div class="podium-card">';
      podium.slice(0, 3).forEach((p, i) => {
        html += `<div class="podium-card-item">
          <div class="pos ${medals[i]}">${p.position}</div>
          <div class="driver">${p.name}</div>
          <div class="team">${p.constructor}</div>
        </div>`;
      });
      html += '</div>';
      return html;
    }

    // ── Render AI response ──
    function renderAIResponse(ai) {
      let html = '';
      if (ai.summary) {
        html += `<div class="ai-section">
          <h4><span class="dot red"></span> Race Summary</h4>
          <p>${ai.summary}</p>
        </div>`;
      }
      if (ai.highlights) {
        html += `<div class="ai-section">
          <h4><span class="dot green"></span> Highlights</h4>
          <p>${ai.highlights}</p>
        </div>`;
      }
      if (ai.insights) {
        html += `<div class="ai-section">
          <h4><span class="dot orange"></span> Insights</h4>
          <p>${ai.insights}</p>
        </div>`;
      }
      if (ai.answer) {
        html += `<div class="ai-section">
          <h4><span class="dot green"></span> Answer</h4>
          <p>${ai.answer}</p>
        </div>`;
      }
      return html || '<p style="color:var(--text-muted)">No analysis available.</p>';
    }

    // ── Build inline race detail ──
    function buildRaceDetail(year, round, data) {
      const id = `detail-${year}-${round}`;
      const aiId = `ai-${year}-${round}`;
      const podium = data.podium || [];
      const btnId = `btn-ai-${year}-${round}`;
      const isFuture = data.is_future_race;

      const detail = document.createElement('div');
      detail.className = 'race-detail';
      detail.id = id;

      if (isFuture) {
        detail.innerHTML = `
          <h3>${data.race_name}</h3>
          <div class="meta">
            <span>📍 ${data.circuit}</span>
            <span>📅 ${data.date}</span>
            <span>🏁 Round ${round}</span>
          </div>
          <div style="padding:0.75rem 0;border-top:1px solid var(--border);margin-top:0.5rem;">
            <p style="color:var(--text-muted);font-size:0.88rem;line-height:1.7;">
              This race has not taken place yet. Results and analysis will be available after the race weekend.
            </p>
          </div>
          <div class="action-bar">
            <button class="btn-ai" id="${btnId}" onclick="askAI(${year}, ${round})">
              🤖 Ask AI
            </button>
            <span style="font-size:0.72rem;color:var(--text-muted)">Preview this upcoming race</span>
          </div>
          <div class="ai-response" id="${aiId}"></div>
        `;
      } else {
        detail.innerHTML = `
          <h3>${data.race_name}</h3>
          <div class="meta">
            <span>📍 ${data.circuit}</span>
            <span>📅 ${data.date}</span>
            <span>🏁 Round ${round}</span>
            ${data.total_drivers ? `<span>👥 ${data.total_drivers} drivers</span>` : ''}
          </div>
          ${podium.length > 0 ? renderPodium(podium) : ''}
          <div class="action-bar">
            <button class="btn-ai" id="${btnId}" onclick="askAI(${year}, ${round})">
              🤖 Ask AI
            </button>
            <span style="font-size:0.72rem;color:var(--text-muted)">Get a detailed AI summary</span>
          </div>
          <div class="ai-response" id="${aiId}"></div>
        `;
      }

      return detail;
    }

    // ── Toggle inline detail ──
    function toggleDetail(year, round, el) {
      const detail = document.getElementById(`detail-${year}-${round}`);
      const item = document.getElementById(`race-item-${year}-${round}`);
      const wasOpen = detail && detail.classList.contains('open');

      // Close all open details
      document.querySelectorAll('.race-detail.open').forEach(d => d.classList.remove('open'));
      document.querySelectorAll('.race-item.expanded').forEach(i => {
        i.classList.remove('expanded', 'selected');
      });

      if (!wasOpen) {
        // Create detail if it doesn't exist
        if (!detail) {
          selectRace(year, round, el);
        } else {
          detail.classList.add('open');
          item.classList.add('expanded', 'selected');
        }
      }
    }

    // ── Select race → load basic info ──
    async function selectRace(year, round, el) {
      const item = document.getElementById(`race-item-${year}-${round}`);
      if (!item) return;

      item.classList.add('expanded', 'selected');

      // Insert detail element right after the race item
      const detail = buildRaceDetail(year, round, {
        race_name: 'Loading...', circuit: '', date: '',
        total_drivers: 0, podium: [], winner: null,
      });
      item.after(detail);

      // Trigger animation next frame
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          detail.classList.add('open');
        });
      });

      try {
        const res = await fetch(`/api/races/${year}/${round}/results`);
        if (!res.ok) { const e = await res.json(); throw new Error(e.detail || 'API error'); }
        const data = await res.json();
        const newDetail = buildRaceDetail(year, round, data);
        detail.replaceWith(newDetail);
        requestAnimationFrame(() => newDetail.classList.add('open'));
      } catch (e) {
        detail.innerHTML = `<p style="padding:0.5rem 0;color:#de7b7b">Error: ${e.message}</p>`;
        detail.classList.add('open');
      }
    }

    // ── Ask AI ──
    async function askAI(year, round) {
      const aiDiv = document.getElementById(`ai-${year}-${round}`);
      const btn = document.getElementById(`btn-ai-${year}-${round}`);
      if (!aiDiv || !btn) return;

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Analyzing…';
      aiDiv.innerHTML = `<div style="padding:0.75rem 0;color:var(--text-muted);text-align:center;">
        <span class="spinner"></span> Qwen is analyzing the race…
      </div>`;
      aiDiv.classList.add('visible');

      try {
        const res = await fetch(`/api/races/${year}/${round}`);
        if (!res.ok) { const e = await res.json(); throw new Error(e.detail || 'API error'); }
        const data = await res.json();
        aiDiv.innerHTML = renderAIResponse(data.ai_response);
      } catch (e) {
        aiDiv.innerHTML = `<p style="padding:0.5rem 0;color:#de7b7b">Error: ${e.message}</p>`;
      } finally {
        btn.disabled = false;
        btn.innerHTML = '🤖 Ask AI';
      }
    }

    // ── Latest race ──
    async function fetchLatest() {
      const container = document.getElementById('latest-container');
      container.innerHTML = '';
      showStatus('latest-status', 'Loading…', 'loading');
      try {
        const res = await fetch('/api/races/latest/results');
        if (!res.ok) { const e = await res.json(); throw new Error(e.detail || 'API error'); }
        const data = await res.json();

        const season = parseInt(data.season);
        const round = data.round;

        const detail = buildRaceDetail(season, round, data);
        container.appendChild(detail);
        requestAnimationFrame(() => detail.classList.add('open'));

        hideStatus('latest-status');
      } catch (e) {
        showStatus('latest-status', 'Error: ' + e.message, 'error');
      }
    }

    // ── Season schedule ──
    async function fetchSeason() {
      const year = document.getElementById('input-year').value;
      if (!year) { showStatus('season-status', 'Please enter a year.', 'error'); return; }

      const btn = document.getElementById('btn-season');
      btn.disabled = true;
      document.getElementById('race-list').classList.remove('visible');
      document.getElementById('season-header').classList.remove('visible');
      showStatus('season-status', `Loading ${year} season schedule…`, 'loading');
      try {
        const res = await fetch(`/api/seasons/${year}/schedule`);
        if (!res.ok) {
          const e = await res.json();
          const msg = e.detail || 'API error';
          // Friendly messages from backend (not true errors)
          if (msg.includes('not held before') || msg.includes('not yet available')) {
            hideStatus('season-status');
            document.getElementById('season-header').classList.add('visible');
            document.getElementById('season-title').textContent = '';
            document.getElementById('season-count').textContent = '';
            const list = document.getElementById('race-list');
            list.innerHTML = `<div class="standings-empty">
              <div class="icon">📅</div>
              <p>${msg}</p>
            </div>`;
            list.classList.add('visible');
          } else {
            throw new Error(msg);
          }
          return;
        }
        const data = await res.json();
        hideStatus('season-status');
        renderSchedule(data);
      } catch (e) {
        showStatus('season-status', 'Error: ' + e.message, 'error');
      } finally {
        btn.disabled = false;
      }
    }

    function renderSchedule(data) {
      document.getElementById('season-title').textContent = data.season + ' Season';
      document.getElementById('season-count').textContent = data.race_count + ' races';
      document.getElementById('season-header').classList.add('visible');

      const list = document.getElementById('race-list');
      list.innerHTML = data.races.map(r =>
        `<div class="race-item" onclick="toggleDetail(${data.season}, ${r.round}, this)" id="race-item-${data.season}-${r.round}">
          <div class="round">${r.round}</div>
          <div class="info">
            <div class="name">${r.race_name}</div>
            <div class="meta">${r.circuit} · ${r.date}</div>
          </div>
          <div class="arrow">▶</div>
        </div>`
      ).join('');
      list.classList.add('visible');
    }

    // ── Standings ──
    function showStandingsType(type) {
      currentStandingsType = type;
      document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      if (currentStandingsYear) fetchStandingsData(currentStandingsYear, type);
    }

    async function fetchStandings() {
      const year = parseInt(document.getElementById('input-standings-year').value);
      if (!year) { showStatus('standings-status', 'Please enter a year.', 'error'); return; }

      currentStandingsYear = year;
      const btn = document.getElementById('btn-standings');
      btn.disabled = true;
      document.getElementById('standings-content').innerHTML = '';
      document.getElementById('standings-type-toggle').style.display = 'none';
      showStatus('standings-status', `Loading ${year} standings…`, 'loading');
      try {
        await fetchStandingsData(year, currentStandingsType);
      } finally {
        btn.disabled = false;
      }
    }

    async function fetchStandingsData(year, type) {
      const endpoint = type === 'drivers' ? 'drivers' : 'constructors';
      try {
        const res = await fetch(`/api/standings/${endpoint}?year=${year}`);
        if (!res.ok) { const e = await res.json(); throw new Error(e.detail || 'API error'); }
        const data = await res.json();

        hideStatus('standings-status');

        // Future year or championship not held — show message instead of table
        if (data.message) {
          document.getElementById('standings-type-toggle').style.display = 'none';
          document.getElementById('standings-content').innerHTML = `
            <div class="standings-empty">
              <div class="icon">📅</div>
              <p>${data.message}</p>
            </div>`;
          return;
        }

        document.getElementById('standings-type-toggle').style.display = 'flex';
        renderStandings(data);
      } catch (e) {
        showStatus('standings-status', 'Error: ' + e.message, 'error');
      }
    }

    function renderStandings(data) {
      const standings = data.standings || [];
      const year = data.season;

      if (standings.length === 0) {
        document.getElementById('standings-content').innerHTML = `
          <div class="standings-empty">
            <div class="icon">📋</div>
            <p>No standings data available for ${year}.</p>
          </div>`;
        return;
      }

      let html = `<h3 style="margin-bottom:1rem;font-size:1.1rem;">${data.type === 'drivers' ? 'Driver' : 'Constructor'} Championship ${year}</h3>`;
      html += '<table class="standings-table"><thead><tr>';
      html += '<th>#</th>';
      html += `<th>${data.type === 'drivers' ? 'Driver' : 'Team'}</th>`;
      if (data.type === 'drivers') html += '<th class="team">Team</th>';
      html += '<th class="wins">W</th>';
      html += '<th class="pts">Pts</th>';
      html += '</tr></thead><tbody>';

      standings.forEach(s => {
        const posClass = s.position <= 3 ? `p${s.position}` : '';
        html += '<tr>';
        html += `<td class="pos ${posClass}">${s.position}</td>`;
        if (data.type === 'drivers') {
          const dId = s.driver_id || '';
          const linkHtml = dId
            ? `<span class="driver-link" onclick="openDriver('${dId}')">${s.driver_name}</span>`
            : s.driver_name;
          html += `<td class="name">${linkHtml}</td>`;
          html += `<td class="team">${s.constructor}</td>`;
        } else {
          html += `<td class="name">${s.constructor}</td>`;
          html += '<td></td>';
        }
        html += `<td class="wins">${s.wins}</td>`;
        html += `<td class="pts">${s.points}</td>`;
        html += '</tr>';
      });

      html += '</tbody></table>';
      document.getElementById('standings-content').innerHTML = html;
    }

    // ── Init ──
    async function checkHealth() {
      try {
        const res = await fetch('/health');
        const data = await res.json();
        const badge = document.getElementById('ai-badge');
        if (data.ai_available) {
          badge.className = 'ai-badge on';
          badge.textContent = 'Qwen AI';
        } else {
          badge.className = 'ai-badge off';
          badge.textContent = 'No AI';
        }
      } catch (e) {}
    }

    document.getElementById('input-year').addEventListener('keydown', e => {
      if (e.key === 'Enter') fetchSeason();
    });
    document.getElementById('input-standings-year').addEventListener('keydown', e => {
      if (e.key === 'Enter') fetchStandings();
    });
    document.getElementById('login-password').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
    document.getElementById('reg-password').addEventListener('keydown', e => {
      if (e.key === 'Enter') doRegister();
    });

    checkHealth();
    fetchLatest();

    // ── Auth ──
    let currentUser = null;

    function getToken() { return localStorage.getItem('f1_token'); }
    function setToken(t) { localStorage.setItem('f1_token', t); }
    function clearToken() { localStorage.removeItem('f1_token'); }

    async function authFetch(url, opts = {}) {
      const headers = opts.headers || {};
      const token = getToken();
      if (token) headers['Authorization'] = `Bearer ${token}`;
      return fetch(url, { ...opts, headers });
    }

    function showAuthStatus(msg, type) {
      const el = document.getElementById('auth-status');
      el.className = 'status ' + type;
      el.innerHTML = type === 'loading' ? `<span class="spinner"></span>${msg}` : msg;
      setTimeout(() => { el.className = 'status'; }, 4000);
    }

    async function doLogin() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      if (!email || !password) { showAuthStatus('Please fill in all fields.', 'error'); return; }
      showAuthStatus('Logging in…', 'loading');
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST', headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({email, password})
        });
        if (!res.ok) { const e = await res.json(); throw new Error(e.detail || 'Login failed'); }
        const data = await res.json();
        setToken(data.access_token);
        showAuthStatus('Logged in!', 'loading');
        await loadProfile();
      } catch (e) { showAuthStatus('Error: ' + e.message, 'error'); }
    }

    async function doRegister() {
      const email = document.getElementById('reg-email').value.trim();
      const name = document.getElementById('reg-name').value.trim();
      const password = document.getElementById('reg-password').value;
      if (!email || !name || !password) { showAuthStatus('Please fill in all fields.', 'error'); return; }
      if (password.length < 8) { showAuthStatus('Password must be at least 8 characters.', 'error'); return; }
      showAuthStatus('Creating account…', 'loading');
      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST', headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({email, password, display_name: name})
        });
        if (!res.ok) { const e = await res.json(); throw new Error(e.detail || 'Registration failed'); }
        const data = await res.json();
        setToken(data.access_token);
        showAuthStatus('Account created!', 'loading');
        await loadProfile();
      } catch (e) { showAuthStatus('Error: ' + e.message, 'error'); }
    }

    function doLogout() {
      clearToken(); currentUser = null;
      document.getElementById('auth-guest').style.display = '';
      document.getElementById('auth-logged-in').style.display = 'none';
      showAuthStatus('Logged out.', 'loading');
    }

    async function loadProfile() {
      try {
        const res = await authFetch('/api/users/me');
        if (!res.ok) { clearToken(); updateHeader(); return; }
        currentUser = await res.json();
        document.getElementById('profile-name').textContent = currentUser.display_name;
        document.getElementById('profile-email').textContent = currentUser.email;
        document.getElementById('auth-guest').style.display = 'none';
        document.getElementById('auth-logged-in').style.display = 'block';
        document.getElementById('auth-status').className = 'status';
        updateHeader();
      } catch (e) { clearToken(); updateHeader(); }
    }

    function updateHeader() {
      const userEl = document.getElementById('header-user');
      const logoutEl = document.getElementById('header-logout');
      const loginEl = document.getElementById('header-login');
      if (currentUser) {
        userEl.textContent = currentUser.display_name;
        userEl.style.display = '';
        logoutEl.style.display = '';
        loginEl.style.display = 'none';
      } else {
        userEl.style.display = 'none';
        logoutEl.style.display = 'none';
        loginEl.style.display = '';
      }
    }

    function doLogout() {
      clearToken(); currentUser = null;
      document.getElementById('auth-guest').style.display = '';
      document.getElementById('auth-logged-in').style.display = 'none';
      showAuthStatus('Logged out.', 'loading');
      updateHeader();
    }

    if (getToken()) loadProfile();
    updateHeader();

    // ── Favorites ──
    let currentDriverId = null;
    let isDriverFav = false;

    async function toggleDriverFav() {
      if (!currentDriverId) return;
      const btn = document.getElementById('driver-fav-btn');
      if (isDriverFav) {
        // Remove favorite
        try {
          const favs = await authFetch('/api/users/me/favorites');
          const list = await favs.json();
          const fav = list.find(f => f.driver_id === currentDriverId);
          if (fav) {
            await authFetch(`/api/users/me/favorites/${fav.id}`, {method: 'DELETE'});
          }
        } catch (e) {}
        isDriverFav = false;
        btn.textContent = '🤍';
        btn.title = 'Add to favorites';
      } else {
        // Add favorite
        await authFetch(`/api/users/me/favorites?driver_id=${currentDriverId}`, {method: 'POST'});
        isDriverFav = true;
        btn.textContent = '❤️';
        btn.title = 'Remove from favorites';
      }
    }

    async function checkDriverFav(driverId) {
      currentDriverId = driverId;
      const btn = document.getElementById('driver-fav-btn');
      if (!getToken()) { btn.style.display = 'none'; return; }
      btn.style.display = '';
      try {
        const res = await authFetch('/api/users/me/favorites');
        const list = await res.json();
        isDriverFav = list.some(f => f.driver_id === driverId);
        btn.textContent = isDriverFav ? '❤️' : '🤍';
        btn.title = isDriverFav ? 'Remove from favorites' : 'Add to favorites';
      } catch (e) { btn.style.display = 'none'; }
    }

    // ── Reminders ──
    function showRemindersStatus(msg, type) {
      const el = document.getElementById('reminders-status');
      el.className = 'status ' + type;
      el.innerHTML = type === 'loading' ? `<span class="spinner"></span>${msg}` : msg;
      setTimeout(() => { el.className = 'status'; }, 4000);
    }

    async function loadRemindersTab() {
      const locked = document.getElementById('reminders-locked');
      const list = document.getElementById('reminders-list-container');
      if (!getToken()) {
        locked.style.display = 'block';
        list.style.display = 'none';
        return;
      }
      locked.style.display = 'none';
      list.style.display = 'block';
      await fetchReminders();
    }

    async function fetchReminders() {
      const container = document.getElementById('reminders-list');
      try {
        const res = await authFetch('/api/reminders/');
        if (!res.ok) throw new Error('Failed to fetch');
        const data = await res.json();
        if (data.length === 0) {
          container.innerHTML = '<div style="text-align:center;padding:1rem;color:var(--text-muted)">No reminders set.</div>';
        } else {
          container.innerHTML = data.map(r => `
            <div class="reminder-item">
              <div class="reminder-info">
                <strong>Round ${r.race_round} (${r.race_year})</strong><br>
                <span style="color:var(--text-muted)">Notify ${r.notify_before_hours}h before via ${r.method}</span>
              </div>
              <button class="btn-danger" onclick="deleteReminder(${r.id})">Delete</button>
            </div>
          `).join('');
        }
      } catch (e) {
        container.innerHTML = '<div style="text-align:center;color:#de7b7b">Error loading reminders.</div>';
      }
    }

    async function createReminder(e) {
      e.preventDefault();
      const year = document.getElementById('rem-year').value;
      const round = document.getElementById('rem-round').value;
      const hours = document.getElementById('rem-hours').value;
      try {
        const res = await authFetch(`/api/reminders/?race_round=${round}&race_year=${year}&notify_before_hours=${hours}`, {
          method: 'POST'
        });
        if (!res.ok) { const err = await res.json(); throw new Error(err.detail || 'Failed'); }
        // Reset form
        document.getElementById('rem-year').value = '';
        document.getElementById('rem-round').value = '';
        document.getElementById('rem-hours').value = '24';
        await fetchReminders();
      } catch (e) {
        showRemindersStatus('Error: ' + e.message, 'error');
      }
    }

    async function deleteReminder(id) {
      try {
        const res = await authFetch(`/api/reminders/${id}`, { method: 'DELETE' });
        if (!res.ok) throw new Error('Failed');
        await fetchReminders();
      } catch (e) {
        showRemindersStatus('Error: ' + e.message, 'error');
      }
    }

    // ── Driver pages ──
    let previousView = null;

    function openDriver(driverId) {
      previousView = {
        tab: document.querySelector('.tab.active')?.id?.replace('tab-', '') || 'latest',
        standingsYear: currentStandingsYear,
      };
      window.location.hash = `#/driver/${driverId}`;
      loadDriverPage(driverId);
    }

    function goBack() {
      window.location.hash = '';
      currentDriverId = null;
      isDriverFav = false;
      if (previousView) {
        switchTab(previousView.tab);
        if (previousView.tab === 'standings' && previousView.standingsYear) {
          document.getElementById('input-standings-year').value = previousView.standingsYear;
          fetchStandingsData(previousView.standingsYear, currentStandingsType);
        }
      } else {
        switchTab('latest');
      }
    }

    async function loadDriverPage(driverId) {
      const content = document.getElementById('driver-content');
      content.innerHTML = `<div style="text-align:center;padding:2rem;"><span class="spinner"></span> Loading driver…</div>`;

      // Hide all other sections
      document.getElementById('section-latest').classList.remove('visible');
      document.getElementById('section-season-controls').classList.remove('visible');
      document.getElementById('section-standings').classList.remove('visible');
      document.getElementById('season-header').classList.remove('visible');
      document.getElementById('race-list').classList.remove('visible');
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

      document.getElementById('section-driver').classList.add('visible');

      try {
        const res = await fetch(`/api/drivers/${driverId}`);
        if (!res.ok) { const e = await res.json(); throw new Error(e.detail || 'API error'); }
        const data = await res.json();
        renderDriverPage(data.driver, content);
        checkDriverFav(data.driver.driver_id);
      } catch (e) {
        content.innerHTML = `<div class="standings-empty"><div class="icon">⚠️</div><p>Error: ${e.message}</p></div>`;
      }
    }

    function renderDriverPage(driver, container) {
      const defaultYear = new Date().getFullYear();
      const num = driver.permanent_number ? `#${driver.permanent_number}` : '';

      let html = `
        <div class="driver-profile">
          <h2>${driver.full_name} ${num}</h2>
          <div class="meta">
            <span>🏳️ ${driver.nationality}</span>
            ${driver.date_of_birth ? `<span>🎂 ${driver.date_of_birth}</span>` : ''}
            ${driver.code ? `<span>🏷️ ${driver.code}</span>` : ''}
          </div>
          <div class="driver-stats">
            <div class="driver-stat-card">
              <div class="label">Driver ID</div>
              <div class="value" style="font-size:0.85rem;">${driver.driver_id}</div>
            </div>
          </div>
        </div>
        <div class="driver-season-select">
          <label>Season Results</label>
          <input type="number" id="driver-season-input" placeholder="${defaultYear}" min="1950" max="2030">
          <button class="btn-primary" onclick="loadDriverSeason('${driver.driver_id}')">Load</button>
        </div>
        <div id="driver-season-results"></div>
      `;
      container.innerHTML = html;

      document.getElementById('driver-season-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') loadDriverSeason(driver.driver_id);
      });
    }

    async function loadDriverSeason(driverId) {
      const yearInput = document.getElementById('driver-season-input');
      const year = parseInt(yearInput.value) || new Date().getFullYear();
      const resultsDiv = document.getElementById('driver-season-results');

      resultsDiv.innerHTML = `<div style="text-align:center;padding:1rem;"><span class="spinner"></span> Loading season…</div>`;

      try {
        const res = await fetch(`/api/drivers/${driverId}?year=${year}`);
        if (!res.ok) { const e = await res.json(); throw new Error(e.detail || 'API error'); }
        const data = await res.json();
        renderDriverSeason(data, resultsDiv);
      } catch (e) {
        resultsDiv.innerHTML = `<div class="standings-empty"><div class="icon">⚠️</div><p>Error: ${e.message}</p></div>`;
      }
    }

    function renderDriverSeason(data, container) {
      const results = data.results || [];
      const stats = data.season_stats || {};

      if (results.length === 0) {
        container.innerHTML = `<div class="standings-empty"><div class="icon">📋</div><p>No results for ${data.season}.</p></div>`;
        return;
      }

      let html = `
        <div class="driver-stats" style="margin-bottom:1rem;">
          <div class="driver-stat-card">
            <div class="label">Races</div>
            <div class="value">${stats.races || results.length}</div>
          </div>
          <div class="driver-stat-card">
            <div class="label">Points</div>
            <div class="value">${stats.points || 0}</div>
          </div>
          <div class="driver-stat-card">
            <div class="label">Best Finish</div>
            <div class="value">${stats.best_finish ? 'P' + stats.best_finish : '—'}</div>
          </div>
        </div>
        <table class="standings-table"><thead><tr>
          <th>Rnd</th><th>Race</th><th>Grid</th><th>Fin</th><th>Pts</th><th>Status</th>
        </tr></thead><tbody>`;

      results.forEach(r => {
        const posClass = r.position <= 3 ? `p${r.position}` : '';
        const posDisplay = r.position || '—';
        const grid = r.grid || '—';
        html += `<tr>
          <td>${r.round}</td>
          <td class="name">${r.race_name}</td>
          <td>${grid}</td>
          <td class="pos ${posClass}">${posDisplay}</td>
          <td class="pts">${r.points}</td>
          <td style="color:var(--text-muted);font-size:0.78rem;">${r.status}</td>
        </tr>`;
      });

      html += '</tbody></table>';
      container.innerHTML = html;
    }

    // Hash routing
    window.addEventListener('hashchange', () => {
      const hash = window.location.hash;
      if (hash.startsWith('#/driver/')) {
        const driverId = hash.replace('#/driver/', '');
        loadDriverPage(driverId);
      } else {
        // Clear driver page, go back to latest
        document.getElementById('section-driver').classList.remove('visible');
        document.getElementById('section-latest').classList.add('visible');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-latest').classList.add('active');
        previousView = null;
      }
    });

    // Handle initial hash on load
    if (window.location.hash.startsWith('#/driver/')) {
      const driverId = window.location.hash.replace('#/driver/', '');
      setTimeout(() => loadDriverPage(driverId), 500);
    }
  </script>
</body>
</html>
